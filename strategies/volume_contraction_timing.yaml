market_regimes: [trending_down, sideways, volatile, trending_up]

instructions: |
  **缩量择时（Volume Contraction Timing Strategy）**

  核心目标：
  - 不默认看多，不追涨，不把上涨趋势作为唯一前提。
  - 重点寻找“下跌缩量后的可控低吸机会”和“上涨缩量后的动能衰减卖点”。
  - 所有买入结论必须同时给出触发条件、分批仓位、失效条件和止损位。
  - 无确认信号时，优先输出“观察/等待企稳”，不要给出激进买入建议。

  分析框架：

  1. **入局观察信号**
     - 股价连续回调 2-5 个交易日，或从近期高点回撤约 5%-18%。
     - 成交量连续萎缩，或当日成交量低于 20 日均量约 70%。
     - 价格接近 MA20、MA60、前低、箱体下沿、趋势线等关键支撑。
     - 跌幅收敛、K 线实体变窄，说明抛压减弱。
     - 若出现放量破位、重大利空或系统性风险，不能判定为低吸机会。
     - 输出倾向：观察、准备低吸、等待企稳。

  2. **第一批低吸信号**
     - 已出现“下跌缩量 + 接近关键支撑”。
     - 当日不再创新低，或盘中跌破支撑后收回。
     - 收盘价守住关键支撑，K 线出现小阳线、十字星、长下影或小实体止跌。
     - 成交量仍保持低位，表示主动抛压下降。
     - 建议仓位：20%-30%，止损设在近期低点、箱体下沿或关键均线下方 2%-3%。

  3. **第二批低吸/加仓信号**
     - 第一批低吸后，价格重新站上 MA5/MA10。
     - 形成更高低点，回踩不破第一批买入区或关键支撑。
     - 成交量温和恢复，但不是放量冲高诱多。
     - 大盘环境没有明显恶化。
     - 建议仓位：再加 20%-30%；若跌破原止损位，不允许补仓摊低成本。

  4. **上涨缩量减仓信号**
     - 从低吸区上涨约 8%-15% 以上，或接近前高、箱体上沿、压力位、布林上轨。
     - 连续上涨但成交量递减，涨幅递减，K 线实体变小或出现上影线。
     - 说明短线动能衰减，优先考虑分批减仓而不是追买。
     - 建议动作：减仓 25%-50%，剩余仓位用上移止盈位保护。

  5. **极致清仓信号**
     - 放量跌破 MA20、箱体下沿、最近低点或入场逻辑对应的核心支撑。
     - 上涨缩量后冲高回落，随后跌破前一交易日低点。
     - 高位长上影、放量滞涨、重大利空或大盘系统性风险显著升高。
     - 输出倾向：清仓、退出观察，等待下一轮结构重新形成。

  评分调整建议：
  - 下跌缩量且接近关键支撑：`sentiment_score +8`
  - 下跌缩量后止跌企稳：`sentiment_score +12`
  - 站回 MA5/MA10 且形成更高低点：`sentiment_score +10`
  - 上涨缩量且接近压力位：`sentiment_score -8`
  - 上涨缩量后冲高回落：`sentiment_score -12`
  - 放量跌破关键支撑：`sentiment_score -20`
  - 出现重大利空：直接降级为减仓、清仓或观望。

  报告输出要求：
  - 必须明确当前属于“入局观察、第一批低吸、第二批加仓、上涨减仓、极致清仓、继续等待”中的哪一类。
  - 买入建议不得只写“可以买”，必须包含分批比例、触发价位/结构、止损位和失效条件。
  - 卖出建议不得只写“注意风险”，必须说明减仓或清仓的触发条件。
