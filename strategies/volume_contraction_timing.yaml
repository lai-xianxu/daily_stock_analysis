# Volume Contraction Timing Strategy / 缩量择时

name: volume_contraction_timing
display_name: 缩量择时
description: 默认个股分析优先策略，识别下跌缩量低吸、分批入场、上涨缩量减仓与清仓信号。
category: timing
core_rules: [1, 2, 4, 5]
required_tools:
  - get_daily_history
  - analyze_trend
  - get_realtime_quote
  - search_stock_news
aliases: [缩量择时, 下跌缩量, 上涨缩量, 分批低吸, 减仓清仓]
default_active: true
default_router: true
