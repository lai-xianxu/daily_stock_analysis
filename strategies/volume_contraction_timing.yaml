instructions: |
  **基本面约束下的多维择时（Multidimensional Timing Strategy）**

  核心目标：
  - 不默认看多，不追涨，也不因单日下跌、单一均线或单一量能异常机械看空。
  - 在长期逻辑未反转的前提下，识别低吸、抢筹、持有和相对高位减仓时机。
  - 成交量不能独立决定任何信号，必须与基本面、价格位置、市场环境、资金或筹码交叉确认。
  - 输出通用策略信号，不读取或推断用户实际持仓、成本和个性化仓位。

  按以下层级判断，前层风险不能被后层分数抵消：

  1. **数据质量门槛**
     - 检查实时行情、K 线、财务、资金和新闻的日期、完整性与可用性。
     - 数据缺失时明确列出限制并降低置信度；关键信息缺失时不得输出高置信度的抢筹或清仓。

  2. **长期逻辑过滤**
     - 综合盈利与增长、现金流、负债、业绩预期、估值和行业地位。
     - 长期逻辑明显恶化时，超跌或缩量不能解释为低吸机会。

  3. **市场与行业环境**
     - 结合大盘趋势、波动水平、行业强弱和个股相对强弱。
     - 市场高波动或行业显著转弱时，降低进攻信号等级和置信度。

  4. **价格结构与位置**
     - 分析回撤、支撑压力、均线结构、形态、乖离及止跌或转强确认。
     - 先判断处于低位、中位还是相对高位，再解释技术指标。

  5. **量价、资金与筹码确认**
     - 比较短中期量能、上涨与下跌日量能、资金流和筹码变化。
     - 这些信息只用于确认抛压、承接或动能变化，不能脱离价格结构单独下结论。

  6. **事件风险否决**
     - 重大业绩恶化、财务或治理风险、监管处罚、退市风险等优先于普通技术信号。
     - 清仓必须有长期逻辑反转、重大硬风险，或严重结构破坏并得到独立维度确认。

  唯一主信号：
  - `watch` 继续观察：数据不足、维度冲突、风险收益不合理，或下跌缩量但没有止跌结构。
  - `low_buy` 适合低吸：长期逻辑未恶化，接近可验证支撑，且至少一项独立证据支持抛压减弱。
  - `accumulate` 适合抢筹：低吸条件成立，并出现转强结构及量能、资金或行业的独立确认，且不处于追涨位置。
  - `hold` 适合持有：长期逻辑与主要结构正常，当前没有更强进攻或退出条件。
  - `reduce` 适合减仓：处于相对高位或接近压力，同时出现上涨缩量、动能衰减、资金流出或行业转弱等独立证据。
  - `exit` 适合清仓：长期逻辑明确反转、出现重大硬风险，或长期结构严重破坏并获独立确认。

  冲突处理：
  - 下跌缩量但没有止跌结构：只能继续观察，不能低吸。
  - 上涨缩量但距离压力位较远且长期逻辑强：适合持有，不能机械减仓。
  - 纯技术破位但长期逻辑尚未失效：优先减仓而不是清仓。
  - 多维结论冲突：选择风险更低的信号，并明确写出冲突。

  报告输出要求：
  - 只输出一个主信号，并遵守 `watch/low_buy/accumulate/hold/reduce/exit` 与评分、动作的映射。
  - 给出 3-5 条理由，至少覆盖三个独立维度，并引用实际数据、结构或已检索事件。
  - 给出可验证的升级条件和降级或失效条件；缺失数据必须明示，禁止编造数字。
  - 不把未经回测的固定回撤、量比或均线阈值写成绝对触发规则。
