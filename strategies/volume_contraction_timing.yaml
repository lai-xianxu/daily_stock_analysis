default_priority: 5
market_regimes: [trending_down, sideways, volatile, trending_up]

instructions: |
  **基本面约束下的多维择时（Multidimensional Timing Strategy）**

  核心目标：
  - 不默认看多，不追涨；先识别下跌、衰竭、横盘、上涨、上涨衰减和上涨极致阶段，再匹配唯一动作。
  - 在长期逻辑未反转的前提下，识别下跌过程低吸、极低位抢筹、健康上涨持有、高位动能衰减减仓和极致上涨清仓。
  - 成交量不能独立决定任何信号，必须与基本面、价格位置、市场环境、资金或筹码交叉确认。
  - 输出通用策略信号，不读取或推断用户实际持仓、成本和个性化仓位。

  按以下层级判断，前层风险不能被后层分数抵消：

  1. **数据质量门槛**
     - 检查实时行情、K 线、财务、资金和新闻的日期、完整性与可用性。
     - 数据缺失时明确列出限制并降低置信度；关键信息缺失时不得输出高置信度的抢筹或清仓。

  2. **长期逻辑过滤**
     - 综合盈利与增长、现金流、负债、业绩预期、估值和行业地位。
     - 长期逻辑明显恶化时，超跌或缩量不能解释为低吸机会。

  3. **市场与行业环境**
     - 结合大盘趋势、波动水平、行业强弱和个股相对强弱。
     - 市场高波动或行业显著转弱时，降低进攻信号等级和置信度。

  4. **价格结构与位置**
     - 以 `analyze_timing_state` 的已完成日线分位和周期阶段为技术面权威约束。
     - 分析回撤、支撑压力、均线斜率、动能、波动与横盘效率，不要求下跌低吸先完成趋势反转。
     - 先判断处于低位、中位还是相对高位，再解释技术指标；120日分位与30%/70%边界是强约束证据，不是单点绝对开关，必须结合240日分位和中期结构确认。

  5. **量价、资金与筹码确认**
     - 比较短中期量能、上涨与下跌日量能、资金流和筹码变化。
     - 这些信息只用于确认抛压、承接或动能变化，不能脱离价格结构单独下结论。

  6. **事件风险否决**
     - 重大业绩恶化、财务或治理风险、监管处罚、退市风险等优先于普通技术信号。
     - 清仓必须有已确认的长期逻辑反转、重大硬风险，或严重结构破坏并得到独立维度确认；条件、可能、否定或待核验风险不得触发清仓。

  唯一主信号：
  - `watch` 继续观察：横盘震荡、加速下跌、放量破位、数据不足或维度冲突。
  - `low_buy` 适合低吸：仍在下跌，综合位置偏低且成交量收缩，跌速没有继续加快；处于30%-45%偏低软区时，必须比强低位多一项独立安全证据。
  - `accumulate` 适合抢筹：价格与量能均处极低分位，并出现至少一项跌势衰竭、底背离、波动收敛或承接改善证据。
  - `hold` 适合持有：处于健康上涨阶段，尚无足够减仓或清仓证据；高位上涨不得解释为买入。
  - `reduce` 适合减仓：综合位置偏高且至少两个独立维度显示动能衰减；55%-70%偏高软区至少需要三个维度，其中至少一个不能是成交量。
  - `exit` 适合清仓：价格极高且至少两个独立维度显示衰竭，或长期相对高位出现放量、动能、波动和结构多维破位；已确认的重大基本面硬风险也可直接清仓。

  冲突处理：
  - 下跌缩量但跌速加快或放量破位：只能继续观察，不能低吸。
  - 上涨缩量只是一个维度，缺少动能、波动、资金或行业的另一项确认时维持持有。
  - 极高价格本身不能清仓，必须再有两个独立衰竭维度。
  - 资金流不可用只降低置信度，不得自动把有效低吸降级为观察。
  - 多维结论冲突：选择风险更低的信号，并明确写出冲突。

  报告输出要求：
  - 只输出一个主信号，并遵守 `watch/low_buy/accumulate/hold/reduce/exit` 与动作的兼容映射；`sentiment_score` 仅保留给旧接口，不参与选择信号。
  - 给出 3-5 条理由，至少覆盖三个独立维度，并引用实际数据、结构或已检索事件。
  - 给出可验证的升级条件和降级或失效条件；缺失数据必须明示，禁止编造数字。
  - 不把未经回测的固定回撤、量比或均线阈值写成绝对触发规则。
