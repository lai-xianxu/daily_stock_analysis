# Multidimensional Timing Strategy / 多维择时

name: volume_contraction_timing
display_name: 多维择时
description: 默认个股分析策略，在基本面与风险约束下综合市场、价格结构、量价、资金和筹码判断进退时机。
category: timing
core_rules: [1, 2, 4, 5]
